<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNIEvent</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
</head>
<body>
  <div class="main-content">
    <div class="container max-w-md">
      <div id="event-loading" class="loading">Loading event details...</div>
      
      <div id="event-content" class="hidden">
        <div class="hero" id="event-hero"></div>
        
        <div style="margin-bottom: 2rem;">
          <span class="badge badge-approved" id="event-category" style="margin-bottom: 1rem;"></span>
          <h1 class="title" id="event-title"></h1>
        </div>

        <div class="card" style="padding: 1.5rem; margin-bottom: 2rem; background: var(--card-bg);">
          <div style="display: flex; flex-direction: column; gap: 1rem;">
            <div style="display: flex; align-items: center; gap: 1rem;">
              <div style="width: 40px; height: 40px; border-radius: 0.5rem; background: var(--hover-bg); display: flex; align-items: center; justify-content: center; color: var(--text-main);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
              </div>
              <div>
                <div style="font-weight: 600;" id="event-date"></div>
                <div style="font-size: 0.875rem; color: var(--gray-500);" id="event-time"></div>
              </div>
            </div>

            <div style="display: flex; align-items: center; gap: 1rem;">
              <div style="width: 40px; height: 40px; border-radius: 0.5rem; background: var(--hover-bg); display: flex; align-items: center; justify-content: center; color: var(--text-main);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
              </div>
              <div>
                <div style="font-weight: 600;" id="event-venue"></div>
              </div>
            </div>
          </div>
        </div>

        <div style="margin-bottom: 2rem;">
          <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem;">About this event</h3>
          <div style="color: var(--gray-500); white-space: pre-wrap; line-height: 1.7;" id="event-description"></div>
        </div>

        <div class="card" style="padding: 1.5rem; text-align: center; border-top: 4px solid var(--amber);">
          <div style="margin-bottom: 1rem; font-weight: 600; font-size: 1.125rem;" id="event-count"></div>
          <div id="rsvp-section"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentEvent = null;
    let isRegistered = false;

    document.addEventListener('DOMContentLoaded', () => {
      if (!checkAuth()) return;

      const urlParams = new URLSearchParams(window.location.search);
      const eventId = urlParams.get('id');

      if (!eventId) {
        window.location.href = 'index.html';
        return;
      }

      loadEventDetails(eventId);
    });

    function loadEventDetails(id) {
      const allEvents = JSON.parse(localStorage.getItem('uni_events') || '[]');
      currentEvent = allEvents.find(e => e.id === id);

      if (!currentEvent) {
        showToast('Event not found');
        setTimeout(() => window.location.href = 'index.html', 1500);
        return;
      }

      const rsvps = JSON.parse(localStorage.getItem('uni_rsvps') || '[]');
      isRegistered = rsvps.some(r => r.eventId === id && r.userId === currentUser.id);

      renderEvent();
    }

    function renderEvent() {
      document.getElementById('event-loading').classList.add('hidden');
      document.getElementById('event-content').classList.remove('hidden');

      const hero = document.getElementById('event-hero');
      if (currentEvent.image_url) {
        hero.innerHTML = `<img src="${currentEvent.image_url}" alt="Hero">`;
      }

      document.getElementById('event-category').className = `badge badge-cat-${currentEvent.category.toLowerCase()}`;
      document.getElementById('event-category').textContent = currentEvent.category;
      document.getElementById('event-title').textContent = currentEvent.title;
      
      const dateObj = new Date(currentEvent.event_date);
      document.getElementById('event-date').textContent = dateObj.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
      document.getElementById('event-time').textContent = `${currentEvent.start_time.slice(0,5)} - ${currentEvent.end_time.slice(0,5)}`;
      document.getElementById('event-venue').textContent = currentEvent.venue;
      document.getElementById('event-description').textContent = currentEvent.description;
      
      const count = currentEvent.registrations || 0;
      document.getElementById('event-count').innerHTML = `
        <span style="color: var(--amber);">★</span> ${count} people going
      `;

      renderRsvpSection();
    }

    function renderRsvpSection() {
      const section = document.getElementById('rsvp-section');
      
      if (currentUser.role !== 'student') {
        section.innerHTML = `<p style="color: var(--gray-500);">Only students can register for events.</p>`;
        return;
      }

      if (isRegistered) {
        const dt = currentEvent.event_date.replace(/-/g, '');
        const start = dt + 'T' + currentEvent.start_time.replace(/:/g, '') + '00';
        const end = dt + 'T' + currentEvent.end_time.replace(/:/g, '') + '00';
        const gcalUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(currentEvent.title)}&dates=${start}/${end}&details=${encodeURIComponent(currentEvent.description)}&location=${encodeURIComponent(currentEvent.venue)}`;

        section.innerHTML = `
          <div style="background: #DEF7EC; color: #03543F; padding: 1rem; border-radius: 0.75rem; margin-bottom: 1rem; font-weight: 600;">
            ✓ You're registered!
          </div>
          <a href="${gcalUrl}" target="_blank" class="btn btn-outline" style="width: 100%; display: flex; gap: 0.5rem; justify-content: center;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            Add to Google Calendar
          </a>
        `;
      } else {
        section.innerHTML = `
          <button id="register-btn" onclick="handleRegister()" class="btn btn-primary" style="width: 100%; font-size: 1.125rem; padding: 1rem;">
            Register Now
          </button>
        `;
      }
    }

    function handleRegister() {
      const btn = document.getElementById('register-btn');
      btn.disabled = true;
      btn.textContent = 'Registering...';

      const rsvps = JSON.parse(localStorage.getItem('uni_rsvps') || '[]');
      rsvps.push({ eventId: currentEvent.id, userId: currentUser.id });
      localStorage.setItem('uni_rsvps', JSON.stringify(rsvps));

      const allEvents = JSON.parse(localStorage.getItem('uni_events') || '[]');
      const idx = allEvents.findIndex(e => e.id === currentEvent.id);
      if (idx !== -1) {
        allEvents[idx].registrations = (allEvents[idx].registrations || 0) + 1;
        localStorage.setItem('uni_events', JSON.stringify(allEvents));
        currentEvent.registrations = allEvents[idx].registrations;
      }

      isRegistered = true;
      
      document.getElementById('event-count').innerHTML = `
        <span style="color: var(--amber);">★</span> ${currentEvent.registrations} people going
      `;
      renderRsvpSection();
    }
  </script>
</body>
</html>
