<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNIEvent</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
</head>
<body>
  <div class="main-content">
    <div class="container max-w-7xl">
      <div style="margin-bottom: 2rem;">
        <h1 class="title">Admin Dashboard</h1>
        <p style="color: var(--gray-500); margin-top: 0.5rem; font-size: 1.125rem;">Review and manage event submissions</p>
      </div>

      <div class="grid grid-cols-1 grid-cols-2">
        <div>
          <h2 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; border-bottom: 2px solid var(--gray-200); padding-bottom: 0.5rem;">Needs Approval</h2>
          <div id="pending-list" style="display: flex; flex-direction: column; gap: 1rem;"></div>
        </div>

        <div>
          <h2 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; border-bottom: 2px solid var(--gray-200); padding-bottom: 0.5rem;">Recently Decided</h2>
          <div id="decided-list" style="display: flex; flex-direction: column; gap: 1rem;"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!checkAuth()) return;

      if (currentUser.role !== 'admin') {
        window.location.href = 'index.html';
        return;
      }

      loadAdminData();
    });

    function loadAdminData() {
      const allEvents = JSON.parse(localStorage.getItem('uni_events') || '[]');
      
      const pending = allEvents.filter(e => e.status === 'pending');
      const decided = allEvents.filter(e => e.status !== 'pending').slice(0, 10);

      renderPending(pending);
      renderDecided(decided);
    }

    function renderPending(events) {
      const container = document.getElementById('pending-list');
      if (events.length === 0) {
        container.innerHTML = `<div style="padding: 2rem; text-align: center; color: var(--gray-500); background: var(--white); border-radius: 1rem; border: 1px dashed var(--gray-200);">All caught up! No pending events.</div>`;
        return;
      }

      container.innerHTML = events.map(ev => `
        <div class="card" style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem;">
          <div style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div>
              <span class="badge badge-cat-${ev.category.toLowerCase()}" style="margin-bottom: 0.5rem;">${ev.category}</span>
              <h3 style="font-size: 1.125rem; font-weight: 700;">${ev.title}</h3>
              <div style="font-size: 0.875rem; color: var(--gray-500); margin-top: 0.25rem;">
                By ${ev.requested_by_name || 'Unknown'} &bull; ${ev.venue} &bull; ${ev.event_date}
              </div>
            </div>
            ${ev.image_url ? `<img src="${ev.image_url}" style="width: 60px; height: 60px; border-radius: 0.5rem; object-fit: cover;">` : ''}
          </div>
          <p style="font-size: 0.875rem; color: var(--gray-500); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
            ${ev.description}
          </p>
          <div style="display: flex; gap: 0.5rem; border-top: 1px solid var(--gray-100); padding-top: 1rem; margin-top: 0.5rem;">
            <button onclick="handleDecision('${ev.id}', 'approved')" class="btn btn-primary" style="flex: 1;">Approve</button>
            <button onclick="handleRejectPrompt('${ev.id}')" class="btn btn-outline" style="flex: 1; color: #9B1C1C; border-color: #FDE8E8; background: #FDE8E8;">Reject</button>
          </div>
        </div>
      `).join('');
    }

    function renderDecided(events) {
      const container = document.getElementById('decided-list');
      if (events.length === 0) {
        container.innerHTML = `<div style="padding: 2rem; text-align: center; color: var(--gray-500);">No recent history.</div>`;
        return;
      }

      container.innerHTML = events.map(ev => `
        <div class="card" style="padding: 1rem; display: flex; align-items: center; justify-content: space-between;">
          <div>
            <h4 style="font-weight: 600; font-size: 0.95rem;">${ev.title}</h4>
            <div style="font-size: 0.75rem; color: var(--gray-500);">By ${ev.requested_by_name || 'Unknown'}</div>
          </div>
          <span class="badge badge-${ev.status}">${ev.status}</span>
        </div>
      `).join('');
    }

    function handleDecision(id, status, reason = null) {
      const events = JSON.parse(localStorage.getItem('uni_events') || '[]');
      const idx = events.findIndex(e => e.id === id);
      if (idx !== -1) {
        events[idx].status = status;
        events[idx].reject_reason = reason;
        localStorage.setItem('uni_events', JSON.stringify(events));
        showToast(`Event ${status}`);
        loadAdminData();
      }
    }

    function handleRejectPrompt(id) {
      const reason = prompt("Enter reason for rejection:");
      if (reason !== null && reason.trim() !== "") {
        handleDecision(id, 'rejected', reason.trim());
      } else if (reason !== null) {
        showToast('Reason is required to reject');
      }
    }
  </script>
</body>
</html>
