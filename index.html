<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discovery | UNIEvent</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
</head>
<body>
  <div class="main-content">
    <div class="container max-w-7xl">
      <div style="margin-bottom: 2rem;">
        <h1 class="title" data-i18n="discover_title">Discover Events</h1>
        <p style="color: var(--gray-500); margin-top: 0.5rem; font-size: 1.125rem;" data-i18n="discover_subtitle">Find and join what's happening at UNITEN</p>
      </div>

      <div class="filter-bar" id="category-filters">
        <button class="filter-pill active" data-category="All" data-i18n="filter_all">All</button>
        <button class="filter-pill" data-category="Workshop" data-i18n="filter_workshop">Workshop</button>
        <button class="filter-pill" data-category="Competition" data-i18n="filter_competition">Competition</button>
        <button class="filter-pill" data-category="Talk" data-i18n="filter_talk">Talk</button>
        <button class="filter-pill" data-category="Social" data-i18n="filter_social">Social</button>
        <button class="filter-pill" data-category="Sports" data-i18n="filter_sports">Sports</button>
        <button class="filter-pill" data-category="Other" data-i18n="filter_other">Other</button>
      </div>

      <div id="events-grid" class="grid grid-cols-1 grid-cols-2 grid-cols-3"></div>
      
      <div id="empty-state" class="hidden" style="text-align: center; padding: 4rem 1rem;">
        <h3 style="font-size: 1.5rem; color: var(--navy); margin-bottom: 0.5rem;" data-i18n="empty_events">No events found</h3>
        <p style="color: var(--gray-500);" data-i18n="empty_events_sub">There are no approved events in this category yet.</p>
      </div>
    </div>
  </div>

  <script>
    let allEvents = [];
    let activeCategory = 'All';

    document.addEventListener('DOMContentLoaded', () => {
      if (!checkAuth()) return;

      loadEvents();

      document.querySelectorAll('.filter-pill').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          activeCategory = e.target.getAttribute('data-category');
          renderEvents();
        });
      });
    });

    function loadEvents() {
      const raw = localStorage.getItem('uni_events');
      if (raw) {
        allEvents = JSON.parse(raw).filter(e => e.status === 'approved');
        allEvents.sort((a,b) => new Date(a.event_date) - new Date(b.event_date));
      }
      renderEvents();
    }

    function renderEvents() {
      const grid = document.getElementById('events-grid');
      const emptyState = document.getElementById('empty-state');
      
      const filtered = activeCategory === 'All' 
        ? allEvents 
        : allEvents.filter(e => e.category === activeCategory);

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div style="grid-column: 1 / -1; padding: 4rem 1rem; text-align: center;">
            <div style="color: var(--gray-400); margin-bottom: 1rem;">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin: 0 auto;"><circle cx="12" cy="12" r="10"></circle><line x1="8" y1="12" x2="16" y2="12"></line></svg>
            </div>
            <h3 style="font-size: 1.25rem; font-weight: 600; color: var(--text-main); margin-bottom: 0.5rem;" data-i18n="empty_events">No events found</h3>
            <p style="color: var(--gray-500);" data-i18n="empty_events_sub">There are no approved events in this category yet.</p>
          </div>
        `;
        emptyState.classList.add('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      
      grid.innerHTML = filtered.map(event => {
        const count = event.registrations || 0;
        const dateObj = new Date(event.event_date);
        const dateStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        
        return `
          <a href="event.html?id=${event.id}" class="card">
            ${event.image_url 
              ? `<img src="${event.image_url}" alt="${event.title}" class="event-img">` 
              : `<div class="event-img"></div>`}
            <div class="event-content">
              <span class="badge badge-cat-${event.category.toLowerCase()}">${event.category}</span>
              <h3 class="event-title">${event.title}</h3>
              <div class="event-meta">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                ${dateStr} &bull; ${event.venue}
              </div>
              <div style="font-size: 0.875rem; color: var(--navy); font-weight: 500; margin-top: 1rem; display: flex; align-items: center; gap: 0.5rem;">
                <div style="width: 24px; height: 24px; border-radius: 50%; background: var(--amber); display: flex; align-items: center; justify-content: center; color: white; font-size: 0.75rem;">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
                <span style="font-weight: 700; color: var(--text-main); margin-right: 0.25rem;">${count}</span> <span data-i18n="going_label">going</span>
              </div>
            </div>
          </a>
        `;
      }).join('');
    }
  </script>
</body>
</html>
