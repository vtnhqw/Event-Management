<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>if(localStorage.getItem('uni_theme')==='dark') document.documentElement.classList.add('dark-mode');</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNIEvent</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
</head>
<body>
  <div class="main-content">
    <div class="container max-w-7xl">
      <!-- Page Header -->
      <div class="page-header">
        <div>
          <h1 class="title" data-i18n="discover_title">Discover Events</h1>
          <p class="page-subheading" data-i18n="discover_subtitle">Find and join what's happening at UNITEN</p>
        </div>
        
        <div class="custom-dropdown" id="month-dropdown">
          <button class="dropdown-trigger" id="month-trigger" onclick="toggleMonthDropdown()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            <span id="month-display" data-i18n="filter_month_all">All Months</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition: transform 0.3s;" id="month-icon"><polyline points="6 9 12 15 18 9"></polyline></svg>
          </button>
          <div class="dropdown-menu-custom" id="month-menu">
            <div class="dropdown-grid">
              <button class="month-option" data-val="01" data-i18n="month_01">January</button>
              <button class="month-option" data-val="02" data-i18n="month_02">February</button>
              <button class="month-option" data-val="03" data-i18n="month_03">March</button>
              <button class="month-option" data-val="04" data-i18n="month_04">April</button>
              <button class="month-option" data-val="05" data-i18n="month_05">May</button>
              <button class="month-option" data-val="06" data-i18n="month_06">June</button>
              <button class="month-option" data-val="07" data-i18n="month_07">July</button>
              <button class="month-option" data-val="08" data-i18n="month_08">August</button>
              <button class="month-option" data-val="09" data-i18n="month_09">September</button>
              <button class="month-option" data-val="10" data-i18n="month_10">October</button>
              <button class="month-option" data-val="11" data-i18n="month_11">November</button>
              <button class="month-option" data-val="12" data-i18n="month_12">December</button>
            </div>
            <div style="margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid var(--border-color);">
              <button class="month-option all-months-btn" data-val="all" data-i18n="filter_month_all" style="width: 100%;">All Months</button>
            </div>
          </div>
        </div>
      </div>

      <div class="filter-bar" id="category-filters">
        <button class="filter-pill active" data-category="All" data-i18n="filter_all">All</button>
        <button class="filter-pill" data-category="Workshop" data-i18n="filter_workshop">Workshop</button>
        <button class="filter-pill" data-category="Competition" data-i18n="filter_competition">Competition</button>
        <button class="filter-pill" data-category="Talk" data-i18n="filter_talk">Talk</button>
        <button class="filter-pill" data-category="Social" data-i18n="filter_social">Social</button>
        <button class="filter-pill" data-category="Sports" data-i18n="filter_sports">Sports</button>
        <button class="filter-pill" data-category="Other" data-i18n="filter_other">Other</button>
      </div>

      <div id="events-grid" class="grid grid-cols-1 grid-cols-2 grid-cols-3"></div>
    </div>
  </div>

  <script>
    let allEvents = [];
    let activeCategory = 'All';
    let activeMonth = 'all';

    document.addEventListener('DOMContentLoaded', () => {
      checkAuth(false);
      
      // Auto-select current month for better UX
      const currentMonthStr = (new Date().getMonth() + 1).toString().padStart(2, '0');
      activeMonth = currentMonthStr;
      
      const defaultBtn = document.querySelector(`.month-option[data-val="${activeMonth}"]`);
      if (defaultBtn) {
        document.querySelectorAll('.month-option').forEach(b => b.classList.remove('active'));
        defaultBtn.classList.add('active');
        const display = document.getElementById('month-display');
        display.setAttribute('data-i18n', defaultBtn.getAttribute('data-i18n'));
        display.innerText = defaultBtn.innerText;
      }
      
      renderEvents();

      document.querySelectorAll('.filter-pill').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('.filter-pill').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          activeCategory = e.target.getAttribute('data-category');
          renderEvents();
        });
      });

      // Custom Dropdown Logic
      document.querySelectorAll('.month-option').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('.month-option').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          activeMonth = e.target.getAttribute('data-val');
          
          const display = document.getElementById('month-display');
          display.setAttribute('data-i18n', e.target.getAttribute('data-i18n'));
          display.innerText = e.target.innerText;
          
          if (typeof applyLang === 'function') applyLang(); // Refresh translation if needed
          
          toggleMonthDropdown();
          renderEvents();
        });
      });

      // Close dropdown when clicking outside
      document.addEventListener('click', (e) => {
        if (!e.target.closest('#month-dropdown')) {
          document.getElementById('month-menu').classList.remove('show');
          document.getElementById('month-icon').style.transform = 'rotate(0)';
        }
      });
    });

    function toggleMonthDropdown() {
      const menu = document.getElementById('month-menu');
      const icon = document.getElementById('month-icon');
      menu.classList.toggle('show');
      if (menu.classList.contains('show')) {
        icon.style.transform = 'rotate(180deg)';
      } else {
        icon.style.transform = 'rotate(0)';
      }
    }

    function renderEvents() {
      const grid = document.getElementById('events-grid');
      let allEvents = JSON.parse(localStorage.getItem('uni_events') || '[]').filter(e => e.status === 'approved');
      allEvents.sort((a, b) => new Date(a.event_date) - new Date(b.event_date));

      const filtered = allEvents.filter(e => {
        const matchCategory = activeCategory === 'All' || e.category === activeCategory;
        const eventMonth = e.event_date ? e.event_date.split('-')[1] : null;
        const matchMonth = activeMonth === 'all' || eventMonth === activeMonth;
        return matchCategory && matchMonth;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="animate-in" style="grid-column: 1 / -1; padding: 5rem 1rem; text-align: center; opacity: 0;">
            <div style="width: 72px; height: 72px; border-radius: 50%; background: var(--hover-bg); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: var(--text-muted);">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </div>
            <h3 style="font-size: 1.25rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.5rem;" data-i18n="empty_events">No events found</h3>
            <p style="color: var(--text-muted); font-size: 0.95rem; max-width: 280px; margin: 0 auto;" data-i18n="empty_events_sub">There are no approved events in this category yet.</p>
          </div>
        `;
        if (typeof applyLang === 'function') applyLang();
        return;
      }
      
      
      grid.innerHTML = filtered.map((event, index) => {
        const count = event.registrations || 0;
        const dateObj = new Date(event.event_date + 'T00:00:00');
        const dateStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        const timeStr = event.start_time ? event.start_time.slice(0,5) : null;
        
        return `
          <a href="event.html?id=${event.id}" class="card animate-in" style="animation-delay: ${index * 0.05}s; opacity: 0; display: block;">
            <div class="event-img-wrapper">
              ${event.image_url 
                ? `<img src="${event.image_url}" alt="${event.title}" class="event-img">` 
                : `<div class="event-img event-img-placeholder"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg></div>`}
            </div>
            <div class="event-content">
              <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem; flex-wrap: wrap;">
                <span class="badge badge-cat-${event.category.toLowerCase()}">${event.category}</span>
                ${event.scorun > 0 ? `<span class="badge" style="background: var(--accent-glow); color: var(--accent); font-weight: 700;">${event.scorun} SCORUN</span>` : ''}
              </div>
              <h3 class="event-title" style="margin-top: 0;">${event.title}</h3>
              <div class="event-meta">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span>${dateStr}${timeStr ? ' · ' + timeStr : ''}</span>
              </div>
              <div class="event-meta" style="margin-bottom: 0;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                <span style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px;">${event.venue}</span>
              </div>
              <div class="event-card-footer">
                <div class="attendee-chip">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                  <span><strong>${count}</strong> going</span>
                </div>
                <span class="view-link">View &rarr;</span>
              </div>
            </div>
          </a>
        `;
      }).join('');
    }
  </script>
</body>
</html>
