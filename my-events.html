<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>if(localStorage.getItem('uni_theme')==='dark') document.documentElement.classList.add('dark-mode');</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNIEvent</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
</head>
<body>
  <div class="main-content">
    <div class="container max-w-7xl">
      <div style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: flex-end;">
        <div>
          <h1 class="title">My Events</h1>
          <p style="color: var(--gray-500); margin-top: 0.5rem; font-size: 1.125rem;">Track the status of your submissions</p>
        </div>
        <a href="submit.html" class="btn btn-primary">Submit New Event</a>
      </div>

      <div id="my-events-list" class="grid grid-cols-1 grid-cols-2 grid-cols-3"></div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (!checkAuth()) return;

      if (currentUser.role !== 'committee') {
        window.location.href = 'index.html';
        return;
      }

      loadMyEvents();
    });

    function loadMyEvents() {
      const allEvents = JSON.parse(localStorage.getItem('uni_events') || '[]');
      const myEvents = allEvents.filter(e => e.requested_by === currentUser.id);
      
      const container = document.getElementById('my-events-list');

      if (myEvents.length === 0) {
        container.innerHTML = `
          <div style="grid-column: 1 / -1; padding: 5rem 1rem; text-align: center;">
            <div style="width: 72px; height: 72px; border-radius: 50%; background: var(--hover-bg); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; color: var(--text-muted);">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="12" y1="18" x2="12" y2="12"></line><line x1="9" y1="15" x2="15" y2="15"></line></svg>
            </div>
            <h3 style="font-size: 1.25rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.5rem;">No events submitted yet</h3>
            <p style="color: var(--text-muted); margin-bottom: 1.5rem; font-size: 0.95rem;">Submit your first event and track its status here.</p>
            <a href="submit.html" class="btn btn-primary">Submit Your First Event</a>
          </div>`;
        return;
      }

      // Sort: pending first, then by date
      myEvents.sort((a, b) => {
        const order = { pending: 0, approved: 1, rejected: 2 };
        return (order[a.status] ?? 3) - (order[b.status] ?? 3);
      });

      container.innerHTML = myEvents.map((ev, index) => {
        const isApproved = ev.status === 'approved';
        const wrapper = isApproved
          ? `<a href="event.html?id=${ev.id}" class="card animate-in" style="animation-delay: ${index * 0.05}s; opacity: 0; display: block; text-decoration: none;">`
          : `<div class="card animate-in" style="animation-delay: ${index * 0.05}s; opacity: 0;">`;
        const wrapperClose = isApproved ? `</a>` : `</div>`;

        const dateStr = ev.event_date
          ? new Date(ev.event_date + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
          : '';

        return `
          ${wrapper}
            ${ev.image_url
              ? `<div class="event-img-wrapper"><img src="${ev.image_url}" class="event-img" style="height: 10rem;"></div>`
              : `<div class="event-img-wrapper"><div class="event-img event-img-placeholder" style="height: 10rem;"></div></div>`}
            <div style="padding: 1.25rem; display: flex; flex-direction: column; flex: 1;">
              <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.5rem; gap: 0.5rem;">
                <span class="badge badge-${ev.status}">${ev.status.charAt(0).toUpperCase() + ev.status.slice(1)}</span>
                <span class="badge badge-cat-${ev.category.toLowerCase()}">${ev.category}</span>
              </div>
              <h3 style="font-size: 1.05rem; font-weight: 700; margin-bottom: 0.35rem; color: var(--text-main);">${ev.title}</h3>
              <div style="font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.35rem;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                ${dateStr}
                <span>&bull;</span>
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                ${ev.venue}
              </div>
              ${ev.status === 'rejected' && ev.reject_reason ? `
                <div style="margin-top: 0.75rem; padding: 0.65rem 0.85rem; background: var(--danger-bg); border: 1px solid var(--danger-border); border-radius: 0.5rem; font-size: 0.82rem; color: var(--danger-text);">
                  <strong>Rejected:</strong> ${ev.reject_reason}
                </div>
              ` : ''}
              ${isApproved ? `
                <div style="margin-top: 0.75rem; display: flex; align-items: center; gap: 0.35rem; font-size: 0.82rem; color: var(--accent); font-weight: 600;">
                  View event details →
                </div>
              ` : ''}
            </div>
          ${wrapperClose}
        `;
      }).join('');
    }
  </script>
</body>
</html>
