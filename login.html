<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>if(localStorage.getItem('uni_theme')==='dark') document.documentElement.classList.add('dark-mode');</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UNIEvent</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
</head>
<body>
  <div class="auth-container">
    <div class="card auth-card" id="signup-card">
      <div class="auth-header">
        <h1 class="title" style="font-size: 2rem;" data-i18n="login_title">Get Started</h1>
        <p style="color: var(--gray-500); margin-top: 0.5rem;" data-i18n="login_sub">Join UNIEvent Prototype</p>
      </div>
      <form id="signup-form">
        <div class="form-group">
          <label class="form-label" data-i18n="lbl_name">Full Name</label>
          <input type="text" id="signup-name" class="form-control" required placeholder="Enter any name">
        </div>
        <div class="form-group">
          <label class="form-label" data-i18n="lbl_role">Role</label>
          <div class="custom-dropdown" id="role-dropdown" style="width: 100%; margin-bottom: 1rem;">
            <button type="button" class="dropdown-trigger" id="role-trigger" onclick="toggleRoleDropdown()" style="width: 100%; justify-content: space-between;">
              <span id="role-display" data-i18n="role_student">Student</span>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition: transform 0.3s;" id="role-icon"><polyline points="6 9 12 15 18 9"></polyline></svg>
            </button>
            <div class="dropdown-menu-custom" id="role-menu" style="width: 100%; max-width: none;">
              <div class="dropdown-grid" style="grid-template-columns: 1fr;">
                <button type="button" class="month-option active role-option" data-val="student" data-i18n="role_student">Student</button>
                <button type="button" class="month-option role-option" data-val="committee" data-i18n="role_committee">Committee</button>
                <button type="button" class="month-option role-option" data-val="admin" data-i18n="role_admin">Admin</button>
              </div>
            </div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;" id="signup-btn" data-i18n="btn_enter">Enter Prototype</button>
      </form>
      <div style="margin-top: 1.5rem; font-size: 0.85rem; color: var(--gray-500); text-align: center; background: var(--hover-bg); padding: 1rem; border-radius: 0.5rem;">
        <strong>Prototype Mode:</strong> No database or password required. Just enter a name, pick a role, and start testing!
      </div>
    </div>
  </div>

  <script>
    let activeRole = 'student';

    function toggleRoleDropdown() {
      const menu = document.getElementById('role-menu');
      const icon = document.getElementById('role-icon');
      menu.classList.toggle('show');
      icon.style.transform = menu.classList.contains('show') ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    document.addEventListener('DOMContentLoaded', () => {
      checkAuth(false);

      // Role Dropdown Logic
      document.querySelectorAll('.role-option').forEach(btn => {
        btn.addEventListener('click', (e) => {
          document.querySelectorAll('.role-option').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          activeRole = e.target.getAttribute('data-val');
          
          const display = document.getElementById('role-display');
          if (e.target.hasAttribute('data-i18n')) {
            display.setAttribute('data-i18n', e.target.getAttribute('data-i18n'));
          }
          display.innerText = e.target.innerText;
          
          if (typeof applyLang === 'function') applyLang();
          
          toggleRoleDropdown();
        });
      });

      // Close dropdown when clicking outside
      document.addEventListener('click', (e) => {
        if (!e.target.closest('#role-dropdown')) {
          const menu = document.getElementById('role-menu');
          if (menu && menu.classList.contains('show')) {
            menu.classList.remove('show');
            document.getElementById('role-icon').style.transform = 'rotate(0)';
          }
        }
      });

      document.getElementById('signup-form').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const name = document.getElementById('signup-name').value;

        // Fake user session
        const fakeUser = {
          id: 'user_' + Date.now(),
          name: name,
          role: activeRole
        };

        localStorage.setItem('uni_user', JSON.stringify(fakeUser));
        window.location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
